# DINO ViT-Tiny/8 baseline for TinyImageNet 64x64.

device: auto

model:
  img_size: 64
  patch_size: 8
  in_chans: 3
  embed_dim: 192
  depth: 6
  num_heads: 3
  mlp_ratio: 4.0
  qkv_bias: true
  patch_norm: false
  drop_rate: 0.0
  attn_dropout: 0.0
  proj_dropout: 0.0
  mlp_dropout: 0.0
  drop_path_rate: 0.1
  pos_embed_type: learned
  use_cls_token: true
  num_register_tokens: 0
  rope_base: 10000.0
  strict_img_size: false

dino_head:
  in_dim: 192
  out_dim: 8192
  hidden_dim: 2048
  bottleneck_dim: 256
  num_layers: 3
  use_bn: false
  norm_last_layer: true
  bias: true
  cls_key: cls

dino:
  num_global_crops: 2
  num_local_crops: 4
  student_temp: 0.1
  teacher_momentum_start: 0.996
  teacher_momentum_end: 1.0
  warmup_teacher_temp: 0.04
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 30
  use_gram_loss: true
  gram_loss_weight: 0.05

optim:
  learning_rate: 5.0e-4
  min_learning_rate: 1.0e-6
  weight_decay: 0.04
  weight_decay_end: 0.4
  betas: [0.9, 0.95]
  eps: 1.0e-8

train:
  epochs: 100
  warmup_epochs: 10
  grad_clip: 1.0
  grad_accum_steps: 1
  max_batches_per_epoch: null
  log_every: 20
  metrics_every: 20
  teacher_offload: true
  exclusive_gpu_model: false
  empty_cache_after_offload: false

checkpoint:
  ckpt_dir: checkpoints/dino_tinyimagenet
  run_name: dino_tinyvit_tinyimagenet
  save_every: 1
  keep_last_n_checkpoints: 3
  monitor_name: loss
  monitor_mode: min

data:
  dataset_name: zh-plus/tiny-imagenet
  dataset_revision: null
  data_dir: data
  artifacts_dir: data/artifacts
  reports_dir: data/reports
  seed: 42
  val_ratio: 0.1
  global_crop_size: 64
  local_crop_size: 32
  global_crop_scale: [0.5, 1.0]
  local_crop_scale: [0.2, 0.5]
  batch_size: 64
  num_workers: 2
  pin_memory: true
  persistent_workers: true
  shuffle_train: true
  drop_last_train: true
  drop_last_val: false
