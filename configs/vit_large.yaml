# DINO ViT-Large/16 — maximum-capacity config
# Architecture: embed_dim=1024 | depth=24 | heads=16 | img=224 | patch=16
# ~307 M parameters. Requires multi-GPU or aggressive gradient accumulation.
# Use AMP (bf16) and teacher_offload=true unless VRAM > 40 GB.

device: auto

# ---------------------------------------------------------------
# ViT backbone  (ViT-L/16)
# ---------------------------------------------------------------
model:
  img_size: 224
  patch_size: 16
  in_chans: 3

  embed_dim: 1024
  depth: 24
  num_heads: 16
  mlp_ratio: 4.0

  qkv_bias: true
  patch_norm: false

  drop_rate: 0.0
  attn_dropout: 0.0
  proj_dropout: 0.0
  mlp_dropout: 0.0
  drop_path_rate: 0.2             # slightly higher stochastic depth for regularization

  pos_embed_type: rope            # RoPE recommended for ViT-L: better length generalization
  use_cls_token: true
  num_register_tokens: 8          # more registers for larger patch grids

  rope_base: 10000.0
  strict_img_size: false

# ---------------------------------------------------------------
# DINO projection head
# ---------------------------------------------------------------
dino_head:
  in_dim: 1024
  out_dim: 65536
  hidden_dim: 4096
  bottleneck_dim: 512
  num_layers: 3
  use_bn: false
  norm_last_layer: true
  bias: true
  cls_key: cls

# ---------------------------------------------------------------
# DINO training hyper-parameters
# ---------------------------------------------------------------
dino:
  num_global_crops: 2
  num_local_crops: 10             # maximise crop diversity for large model

  student_temp: 0.1

  teacher_momentum_start: 0.9995
  teacher_momentum_end: 1.0

  warmup_teacher_temp: 0.04
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 50

  use_gram_loss: true
  gram_loss_weight: 0.02          # reduce weight — large model already regularizes well

# ---------------------------------------------------------------
# Optimizer
# ---------------------------------------------------------------
optim:
  learning_rate: 1.0e-4           # conservative LR for large model
  min_learning_rate: 1.0e-6

  weight_decay: 0.04
  weight_decay_end: 0.4

  betas: [0.9, 0.95]
  eps: 1.0e-8

# ---------------------------------------------------------------
# Training loop
# ---------------------------------------------------------------
train:
  epochs: 800
  warmup_epochs: 10

  grad_clip: 3.0
  grad_accum_steps: 8             # effective batch ~= 32 * 8 = 256

  max_batches_per_epoch: null
  log_every: 100
  metrics_every: 100

  teacher_offload: true           # required unless VRAM > 40 GB
  exclusive_gpu_model: false
  empty_cache_after_offload: true

# ---------------------------------------------------------------
# Checkpoints
# ---------------------------------------------------------------
checkpoint:
  ckpt_dir: checkpoints/dino_vit_large
  run_name: dino_vitl16

  save_every: 10
  keep_last_n_checkpoints: 2

  monitor_name: loss
  monitor_mode: min

# ---------------------------------------------------------------
# Data
# ---------------------------------------------------------------
data:
  dataset_name: zh-plus/tiny-imagenet
  dataset_revision: null
  data_dir: data
  artifacts_dir: data/artifacts
  reports_dir: data/reports

  seed: 42
  val_ratio: 0.1

  global_crop_size: 224
  local_crop_size: 96
  global_crop_scale: [0.4, 1.0]
  local_crop_scale: [0.05, 0.4]

  batch_size: 32                  # small batch due to VRAM constraints
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  shuffle_train: true
  drop_last_train: true
  drop_last_val: false

  quality:
    blur_variance_threshold: 0.002
    dark_mean_threshold: 0.08
    bright_mean_threshold: 0.92
    low_contrast_std_threshold: 0.05
    saturated_pixel_fraction_threshold: 0.2
    tiny_side_threshold: 32
    flag_top_k_examples: 25
