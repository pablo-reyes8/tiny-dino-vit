# DINO debug / CI config — completes in minutes on CPU or any GPU.
# Intentionally tiny: 2 epochs, 10 batches, minimal model.
# Do NOT use this for actual training.

device: auto

# ---------------------------------------------------------------
# ViT backbone  (micro)
# ---------------------------------------------------------------
model:
  img_size: 32
  patch_size: 8
  in_chans: 3

  embed_dim: 64
  depth: 2
  num_heads: 2
  mlp_ratio: 2.0

  qkv_bias: true
  patch_norm: false

  drop_rate: 0.0
  attn_dropout: 0.0
  proj_dropout: 0.0
  mlp_dropout: 0.0
  drop_path_rate: 0.0

  pos_embed_type: learned
  use_cls_token: true
  num_register_tokens: 0

  rope_base: 10000.0
  strict_img_size: false

# ---------------------------------------------------------------
# DINO projection head
# ---------------------------------------------------------------
dino_head:
  in_dim: 64
  out_dim: 512
  hidden_dim: 256
  bottleneck_dim: 64
  num_layers: 2
  use_bn: false
  norm_last_layer: false
  bias: true
  cls_key: cls

# ---------------------------------------------------------------
# DINO training hyper-parameters
# ---------------------------------------------------------------
dino:
  num_global_crops: 2
  num_local_crops: 2

  student_temp: 0.1

  teacher_momentum_start: 0.996
  teacher_momentum_end: 1.0

  warmup_teacher_temp: 0.04
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 1

  use_gram_loss: false
  gram_loss_weight: 0.0

# ---------------------------------------------------------------
# Optimizer
# ---------------------------------------------------------------
optim:
  learning_rate: 1.0e-3
  min_learning_rate: 1.0e-6

  weight_decay: 0.04
  weight_decay_end: 0.4

  betas: [0.9, 0.95]
  eps: 1.0e-8

# ---------------------------------------------------------------
# Training loop
# ---------------------------------------------------------------
train:
  epochs: 2
  warmup_epochs: 1

  grad_clip: 1.0
  grad_accum_steps: 1

  max_batches_per_epoch: 10     # only 10 batches for a fast smoke test
  log_every: 5
  metrics_every: 5

  teacher_offload: false
  exclusive_gpu_model: false
  empty_cache_after_offload: false

# ---------------------------------------------------------------
# Checkpoints
# ---------------------------------------------------------------
checkpoint:
  ckpt_dir: checkpoints/debug
  run_name: dino_debug

  save_every: 1
  keep_last_n_checkpoints: 1

  monitor_name: loss
  monitor_mode: min

# ---------------------------------------------------------------
# Data
# ---------------------------------------------------------------
data:
  dataset_name: zh-plus/tiny-imagenet
  dataset_revision: null
  data_dir: data
  artifacts_dir: data/artifacts
  reports_dir: data/reports

  seed: 0
  val_ratio: 0.1

  global_crop_size: 32
  local_crop_size: 16
  global_crop_scale: [0.5, 1.0]
  local_crop_scale: [0.2, 0.5]

  batch_size: 8
  num_workers: 0                # 0 workers avoids multiprocessing overhead in CI
  pin_memory: false
  persistent_workers: false
  shuffle_train: true
  drop_last_train: false
  drop_last_val: false

  quality:
    blur_variance_threshold: 0.002
    dark_mean_threshold: 0.08
    bright_mean_threshold: 0.92
    low_contrast_std_threshold: 0.05
    saturated_pixel_fraction_threshold: 0.2
    tiny_side_threshold: 16
    flag_top_k_examples: 5
