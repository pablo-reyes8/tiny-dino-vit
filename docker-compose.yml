version: "3.9"

services:

  # ---------------------------------------------------------------
  # Training service
  # ---------------------------------------------------------------
  train:
    build:
      context: .
      dockerfile: Dockerfile
    image: dino-train
    runtime: nvidia          # remove if no GPU available
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
      - ./configs:/app/configs
    command: >
      python scripts/train_dino.py --config configs/set_up.yaml
    # Override command at runtime:
    #   docker-compose run train python scripts/train_dino.py --config configs/vit_small.yaml

  # ---------------------------------------------------------------
  # API inference server
  # ---------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: dino-api
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints
    environment:
      - DINO_CHECKPOINT=/app/checkpoints/dino_tinyvit_tinyimagenet/dino_tinyvit_tinyimagenet_best.pt
      - DINO_DEVICE=auto
      - DINO_MAX_IMAGE_SIZE=1024
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
