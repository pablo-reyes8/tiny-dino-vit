version: 2

updates:
  # ── Python dependencies ──────────────────────────────────────────
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Bogota
    open-pull-requests-limit: 5
    groups:
      # Batch all torch-family updates into one PR
      pytorch:
        patterns:
          - "torch*"
          - "torchvision*"
      # Batch linting / dev toolchain into one PR
      dev-tools:
        patterns:
          - "black"
          - "ruff"
          - "isort"
          - "mypy"
          - "pytest*"
      # Batch API stack into one PR
      api:
        patterns:
          - "fastapi"
          - "uvicorn*"
          - "python-multipart"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"

  # ── GitHub Actions ───────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "06:00"
      timezone: America/Bogota
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
